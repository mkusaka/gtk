name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Run lints
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build JavaScript output
        run: pnpm build

  release:
    name: Create Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_url: ${{ steps.version.outputs.release_url }}
      formula_name: ${{ steps.formula.outputs.formula_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release configuration
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Missing required secret: HOMEBREW_TAP_TOKEN"
            exit 1
          fi

      - name: Set formula metadata
        id: formula
        run: |
          echo "formula_name=gtk" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")

          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not read package version from package.json"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) must match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "gtk $GITHUB_REF_NAME" \
            --generate-notes

  package:
    name: Package Binary (${{ matrix.label }})
    needs: release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            target: bun-darwin-arm64
            archive_suffix: darwin-arm64
          - label: Intel
            runner: macos-15-intel
            target: bun-darwin-x64
            archive_suffix: darwin-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.1
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build compiled binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rm -rf release-root
          mkdir -p release-root/skills
          bun build --compile --target="$TARGET" src/index.ts --outfile gtk
          ./gtk --help >/dev/null
          cp gtk release-root/gtk
          cp -R skills/gtk-google-tasks release-root/skills/

      - name: Package release archive
        env:
          VERSION: ${{ needs.release.outputs.version }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_suffix }}
        run: |
          ASSET_NAME="gtk-${VERSION}-${ARCHIVE_SUFFIX}.tar.gz"
          tar -C release-root -czf "$ASSET_NAME" .
          SHA256=$(shasum -a 256 "$ASSET_NAME" | awk '{print $1}')

          {
            echo "ASSET_NAME=$ASSET_NAME"
            echo "SHA256=$SHA256"
          } >> "$GITHUB_ENV"

          cat > "release-metadata-${ARCHIVE_SUFFIX}.json" <<EOF
          {
            "archive_suffix": "${ARCHIVE_SUFFIX}",
            "asset_name": "${ASSET_NAME}",
            "asset_url": "${RELEASE_URL}/${ASSET_NAME}",
            "sha256": "${SHA256}"
          }
          EOF

      - name: Upload archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "$ASSET_NAME" --clobber

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata-${{ matrix.archive_suffix }}
          path: release-metadata-${{ matrix.archive_suffix }}.json

  publish:
    name: Publish Release
    needs: [release, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft to published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"

  update_homebrew_tap:
    name: Update Homebrew Tap
    needs: [release, package, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-metadata-*
          merge-multiple: true

      - name: Dispatch tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          FORMULA_NAME: ${{ needs.release.outputs.formula_name }}
          REPOSITORY_NAME: ${{ github.repository }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          DARWIN_ARM64_URL=$(jq -r 'select(.archive_suffix == "darwin-arm64") | .asset_url' release-metadata-*.json)
          DARWIN_ARM64_SHA256=$(jq -r 'select(.archive_suffix == "darwin-arm64") | .sha256' release-metadata-*.json)
          DARWIN_X64_URL=$(jq -r 'select(.archive_suffix == "darwin-x64") | .asset_url' release-metadata-*.json)
          DARWIN_X64_SHA256=$(jq -r 'select(.archive_suffix == "darwin-x64") | .sha256' release-metadata-*.json)

          if [[ -z "$DARWIN_ARM64_URL" || "$DARWIN_ARM64_URL" == "null" ]]; then
            echo "::error::Missing Darwin arm64 release metadata"
            exit 1
          fi
          if [[ -z "$DARWIN_ARM64_SHA256" || "$DARWIN_ARM64_SHA256" == "null" ]]; then
            echo "::error::Missing Darwin arm64 checksum"
            exit 1
          fi
          if [[ -z "$DARWIN_X64_URL" || "$DARWIN_X64_URL" == "null" ]]; then
            echo "::error::Missing Darwin x64 release metadata"
            exit 1
          fi
          if [[ -z "$DARWIN_X64_SHA256" || "$DARWIN_X64_SHA256" == "null" ]]; then
            echo "::error::Missing Darwin x64 checksum"
            exit 1
          fi

          gh api repos/mkusaka/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[formula]=$FORMULA_NAME" \
            -f "client_payload[repository]=$REPOSITORY_NAME" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[darwin_arm64_url]=$DARWIN_ARM64_URL" \
            -f "client_payload[darwin_arm64_sha256]=$DARWIN_ARM64_SHA256" \
            -f "client_payload[darwin_x64_url]=$DARWIN_X64_URL" \
            -f "client_payload[darwin_x64_sha256]=$DARWIN_X64_SHA256"
